version: '3.8' 

services:
  db:
    image: postgres:15-alpine
    container_name: auth_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres} 
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-messenger_db}
    # ports: - "5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: messenger_redis 
    restart: always
    # ports: - "6379:6379"

  auth:
    build: ./auth-service 
    container_name: auth_service
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}

  server:
    build: ./messenger-server
    container_name: messenger_server
    ports:
      - "8080:8080" 
    depends_on:
      - db
      - auth
      - redis 
    environment:
      - AUTH_SERVICE_ADDR=auth:50051 
      - REDIS_HOST=redis
      - REDIS_PORT=6379

volumes:
  postgres_data: